<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass — Wallpaper Pack</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ───────────────────────────────────────────────── */
    :root {
      --serif: 'DM Serif Display', serif;
      --mono:  'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scene (wallpaper layer) ─────────────────────────────── */
    /* Each .scene is an absolutely-positioned layer; only .active is visible. */
    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }
    .scene.active {
      opacity: 1;
      pointer-events: auto;
    }

    .bg-noise,
    .bg-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.6s ease;
    }

    /* ── DARK ────────────────────────────────────────────────── */
    .scene.theme-dark { background: #09090f; }

    .theme-dark .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 200px;
      opacity: 0.4;
    }
    .theme-dark .bg-glow {
      background: radial-gradient(ellipse at 50% 0%, rgba(155, 184, 255, 0.05) 0%, transparent 60%);
    }
    .theme-dark .wordmark { color: #dddde8; }
    .theme-dark .tagline  { color: rgba(221, 221, 232, 0.4); }

    /* ── LIGHT ───────────────────────────────────────────────── */
    .scene.theme-light { background: #f0eff8; }

    .theme-light .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      background-size: 200px;
      opacity: 0.6;
    }
    .theme-light .bg-glow {
      background: radial-gradient(ellipse at 50% 100%, rgba(90, 127, 212, 0.07) 0%, transparent 60%);
    }
    .theme-light .wordmark { color: #000000; }
    .theme-light .tagline  { color: rgba(0, 0, 0, 0.55); }

    /* ── HOLO ────────────────────────────────────────────────── */
    .scene.theme-holo { background: #0a0812; }

    .theme-holo .bg-noise {
      background-image:
        radial-gradient(1px 1px at 8% 12%,   rgba(255, 255, 255, 0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 5%,   rgba(255, 255, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 38% 18%, rgba(255, 255, 255, 0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 8%,   rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 22%,  rgba(255, 255, 255, 0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 10%,  rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 15% 35%, rgba(180, 140, 255, 0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 42% 42%,  rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 62% 30%,  rgba(140, 200, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 45%,  rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 38%,  rgba(255, 255, 255, 0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 60%,   rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 28% 68%, rgba(255, 255, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 48% 75%,  rgba(255, 255, 255, 0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 68% 62%,  rgba(255, 180, 140, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 72%,  rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 85%,  rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 52% 90%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 88%,  rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 82%,  rgba(255, 255, 255, 0.4) 0%, transparent 100%);
      opacity: 1;
    }
    .theme-holo .bg-glow {
      background:
        radial-gradient(ellipse at 20% 60%, rgba(0, 210, 180, 0.12)  0%, transparent 50%),
        radial-gradient(ellipse at 75% 40%, rgba(120, 80, 255, 0.18) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 80%, rgba(0, 140, 255, 0.1)   0%, transparent 50%),
        radial-gradient(ellipse at 90% 20%, rgba(255, 80, 180, 0.1)  0%, transparent 40%);
    }
    .theme-holo .wordmark {
      color: transparent;
      background: linear-gradient(
        160deg,
        #ffffff  0%,
        #e0c8ff 20%,
        #9bb8ff 40%,
        #ffffff 55%,
        #ffd680 70%,
        #ff9bb8 85%,
        #c8b0ff 100%
      );
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: foilText 3s linear infinite;
      filter:
        drop-shadow(0 0 20px rgba(180, 140, 255, 0.6))
        drop-shadow(0 0 50px rgba(100, 160, 255, 0.3));
    }
    .theme-holo .tagline { color: rgba(155, 184, 255, 0.4); }

    /* Holo: hide the standard content block; show the card */
    .theme-holo .content { display: none; }
    .theme-holo .holo-card-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* ── FOIL ────────────────────────────────────────────────── */
    .scene.theme-foil { background: #080608; }

    .theme-foil .bg-noise {
      background: radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.015) 0%, transparent 70%);
      opacity: 1;
    }
    .theme-foil .bg-glow { opacity: 0; }
    .theme-foil .wordmark {
      color: transparent;
      background: linear-gradient(105deg, #ff6ec4 0%, #ffe566 25%, #4dd9f0 50%, #ffe566 75%, #ff6ec4 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: foilText 5s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 30px rgba(155, 184, 255, 0.15));
    }
    .theme-foil .tagline { color: rgba(255, 255, 255, 0.2); }

    /* ── Content & typography ────────────────────────────────── */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
    }

    /* Wordmark — same as waitlist, but entrance animation removed for wallpaper */
    .wordmark {
      font-family: var(--serif);
      font-size: clamp(72px, 12vw, 160px);
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      padding: 4px 10px;
      opacity: 1;
      transition: color 0.4s ease, filter 0.4s ease;
    }

    /* Holo/foil wordmarks keep their gradient animation; skip rise */
    .theme-holo .wordmark { opacity: 1; }
    .theme-foil .wordmark { opacity: 1; }

    .tagline {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      margin-top: 16px;
      transition: color 0.4s ease;
      opacity: 1;
    }

    /* ── Holo card ───────────────────────────────────────────── */
    .holo-card-wrap {
      display: none;
      position: relative;
      z-index: 2;
      perspective: 800px;
    }

    .holo-card {
      position: relative;
      width: min(380px, 72vw);
      height: min(480px, 75vh);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1.5px rgba(255, 255, 255, 0.14),
        0 0 40px rgba(180, 100, 255, 0.5),
        0 0 100px rgba(100, 180, 255, 0.3),
        0 40px 80px rgba(0, 0, 0, 0.85);
      transform-style: preserve-3d;
      transition: transform 0.12s ease;
      cursor: none;
    }

    .hc-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #1a1040 0%, #0d1a2e 40%, #1a0d2e 70%, #0a1520 100%);
    }

    .hc-stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%,   rgba(255, 255, 255, 0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 8%,    rgba(255, 255, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 15%, rgba(255, 255, 255, 0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 25%,   rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 12%,   rgba(255, 255, 255, 0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%,   rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 45% 55%, rgba(255, 255, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 45%,   rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 82% 60%,   rgba(255, 255, 255, 0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 70%,   rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30% 80%, rgba(255, 255, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 88%,   rgba(255, 255, 255, 0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 75%,   rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 85%,   rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 20% 55%,   rgba(180, 140, 255, 0.8) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 30%,   rgba(140, 200, 255, 0.7) 0%, transparent 100%),
        radial-gradient(2px 2px at 80% 50%,   rgba(255, 180, 140, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 45%,    rgba(255, 255, 255, 0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 35%,   rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 92%,   rgba(255, 255, 255, 0.3) 0%, transparent 100%);
    }

    .hc-particles {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 70%, rgba(180, 80, 255, 0.3)  0%, transparent 30%),
        radial-gradient(circle at 70% 30%, rgba(80, 180, 255, 0.25) 0%, transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(255, 160, 80, 0.1)  0%, transparent 40%);
      animation: energyPulse 4s ease-in-out infinite alternate;
    }

    .hc-holo {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        125deg,
        rgba(255, 0, 128, 0) 0%,
        rgba(255, 100, 0, 0.15) 10%,
        rgba(255, 220, 0, 0.2) 20%,
        rgba(0, 255, 100, 0.15) 30%,
        rgba(0, 200, 255, 0.2) 40%,
        rgba(100, 0, 255, 0.15) 50%,
        rgba(255, 0, 200, 0.2) 60%,
        rgba(255, 100, 0, 0.15) 70%,
        rgba(255, 220, 0, 0.1) 80%,
        rgba(0, 255, 150, 0.15) 90%,
        rgba(0, 180, 255, 0) 100%
      );
      background-size: 300% 300%;
      animation: holoShift 6s ease infinite;
      mix-blend-mode: screen;
      opacity: 0.8;
    }

    .hc-scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.08) 3px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
    }

    .hc-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 30%,
        rgba(255, 255, 255, 0.08) 45%,
        rgba(255, 255, 255, 0.18) 50%,
        rgba(255, 255, 255, 0.08) 55%,
        transparent 70%
      );
      background-size: 200% 100%;
      animation: shimmerSweep 3s ease-in-out infinite;
    }

    .hc-frame {
      position: absolute;
      inset: 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      box-shadow: inset 0 0 24px rgba(140, 100, 255, 0.08);
      pointer-events: none;
    }

    .hc-type {
      position: absolute;
      top: 18px;
      left: 20px;
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(155, 184, 255, 0.7);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      z-index: 10;
    }

    .hc-hp {
      position: absolute;
      top: 18px;
      right: 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.1em;
      z-index: 10;
    }

    /* Serial moved up since there's no form area at the bottom */
    .hc-serial {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-family: var(--mono);
      font-size: 8px;
      color: rgba(255, 255, 255, 0.18);
      letter-spacing: 0.08em;
      z-index: 10;
    }

    /* Wordmark re-centred since form area is removed */
    .hc-wordmark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      font-family: var(--serif);
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.02em;
      color: transparent;
      background: linear-gradient(
        160deg,
        #ffffff  0%,
        #e0c8ff 20%,
        #9bb8ff 40%,
        #ffffff 55%,
        #ffd680 70%,
        #ff9bb8 85%,
        #c8b0ff 100%
      );
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: foilText 3s linear infinite;
      filter:
        drop-shadow(0 0 14px rgba(180, 140, 255, 0.8))
        drop-shadow(0 0 35px rgba(100, 160, 255, 0.5));
      z-index: 10;
    }

    /* ── Keyframes ───────────────────────────────────────────── */
    @keyframes foilText {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    @keyframes holoShift {
      0%   { background-position: 0% 0%; }
      50%  { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }
    @keyframes energyPulse {
      0%   { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.02); }
    }
    @keyframes shimmerSweep {
      0%   { background-position: -100% 0; }
      60%  { background-position: 200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── Nav chrome ──────────────────────────────────────────── */
    .nav-chrome {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(9, 9, 15, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      padding: 8px 14px 8px 12px;
      font-family: var(--mono);
    }
    .nav-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.45);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 5px;
      line-height: 1;
      transition: color 0.2s;
      font-family: inherit;
    }
    .nav-btn:hover { color: #fff; }
    .nav-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .nav-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.3s ease, transform 0.2s ease;
      border: none;
      padding: 0;
      flex-shrink: 0;
    }
    .nav-dot.active { opacity: 1; transform: scale(1.25); }
    .nav-dot:hover:not(.active) { opacity: 0.6; }
    .nav-dot[data-i="0"] { background: #dddde8; }
    .nav-dot[data-i="1"] { background: #09090f; outline: 1px solid rgba(0,0,0,0.35); }
    .nav-dot[data-i="2"] { background: linear-gradient(135deg, #c97bff, #9bb8ff, #6bdb9e); }
    .nav-dot[data-i="3"] { background: linear-gradient(105deg, #ff6ec4, #ffe566, #4dd9f0); }
    .nav-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.5);
      min-width: 34px;
    }
    .nav-hint {
      font-size: 10px;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.18);
    }
  </style>
</head>
<body>

  <!-- ── 1. DARK ─────────────────────────────────────────────── -->
  <div class="scene theme-dark active" id="wp-0">
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="bg-glow"  aria-hidden="true"></div>
    <div class="content">
      <span class="wordmark">Glass</span>
    </div>
  </div>

  <!-- ── 2. LIGHT ────────────────────────────────────────────── -->
  <div class="scene theme-light" id="wp-1">
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="bg-glow"  aria-hidden="true"></div>
    <div class="content">
      <span class="wordmark">Glass</span>
    </div>
  </div>

  <!-- ── 3. HOLO ─────────────────────────────────────────────── -->
  <!-- content is hidden by .theme-holo .content { display: none } -->
  <div class="scene theme-holo" id="wp-2">
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="bg-glow"  aria-hidden="true"></div>
    <div class="content" aria-hidden="true">
      <span class="wordmark">Glass</span>
    </div>
    <div class="holo-card-wrap">
      <div class="holo-card">
        <div class="hc-bg"></div>
        <div class="hc-stars"></div>
        <div class="hc-particles"></div>
        <div class="hc-holo"></div>
        <div class="hc-shimmer"></div>
        <div class="hc-scan"></div>
        <div class="hc-frame"></div>
        <div class="hc-type">Ultra Rare</div>
        <div class="hc-hp">∞ HP</div>
        <div class="hc-wordmark">Glass</div>
        <div class="hc-serial">001 / 001</div>
        <!-- hc-form-area removed -->
      </div>
    </div>
  </div>

  <!-- ── 4. FOIL ─────────────────────────────────────────────── -->
  <div class="scene theme-foil" id="wp-3">
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="bg-glow"  aria-hidden="true"></div>
    <div class="content">
      <span class="wordmark">Glass</span>
    </div>
  </div>

  <!-- ── Nav ────────────────────────────────────────────────── -->
  <nav class="nav-chrome" aria-label="Theme">
    <button class="nav-btn" id="prev" aria-label="Previous theme">←</button>
    <div class="nav-dots">
      <button class="nav-dot active" data-i="0" title="Dark"></button>
      <button class="nav-dot"        data-i="1" title="Light"></button>
      <button class="nav-dot"        data-i="2" title="Holo"></button>
      <button class="nav-dot"        data-i="3" title="Foil"></button>
    </div>
    <span class="nav-label" id="nav-label">Dark</span>
    <button class="nav-btn" id="next" aria-label="Next theme">→</button>
    <span class="nav-hint">1–4 · ←→</span>
    <button class="nav-btn nav-screenshot" id="screenshot" title="Save screenshot">⬇</button>
  </nav>

  <script>
    const scenes = document.querySelectorAll('.scene');
    const dots   = document.querySelectorAll('.nav-dot');
    const label  = document.getElementById('nav-label');
    const names  = ['Dark', 'Light', 'Holo', 'Foil'];
    let cur = 0;

    function show(i) {
      scenes[cur].classList.remove('active');
      dots[cur].classList.remove('active');
      cur = ((i % 4) + 4) % 4;
      scenes[cur].classList.add('active');
      dots[cur].classList.add('active');
      label.textContent = names[cur];
    }

    document.getElementById('next').addEventListener('click', () => show(cur + 1));
    document.getElementById('prev').addEventListener('click', () => show(cur - 1));
    dots.forEach(d => d.addEventListener('click', () => show(+d.dataset.i)));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') show(cur + 1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   show(cur - 1);
      if (['1','2','3','4'].includes(e.key)) show(+e.key - 1);
    });

    document.getElementById('screenshot').addEventListener('click', async () => {
      const nav = document.querySelector('.nav-chrome');
      nav.style.display = 'none';
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      try {
        const { toPng } = await import('https://esm.sh/html-to-image@1.11.11');
        const dataUrl = await toPng(document.body, {
          pixelRatio: window.devicePixelRatio,
          width: window.innerWidth,
          height: window.innerHeight,
        });
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `glass-wallpaper-${names[cur].toLowerCase()}.png`;
        a.click();
      } finally {
        nav.style.display = '';
      }
    });
  </script>
</body>
</html>
